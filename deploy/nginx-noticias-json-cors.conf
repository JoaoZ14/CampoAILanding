# =============================================================================
# CampoAI — CORS para noticias.json (site no Netlify, JSON na VPS)
# =============================================================================
# Como usar:
#   1) Troque TODAS as ocorrências de:
#        https://SEU-SITE.netlify.app
#      pela origem exata do Netlify (com https, sem barra no final).
#      Ex.: https://campoai-landing.netlify.app
#      (Netlify → Site → Domain management → o domínio principal.)
#
#   2) Coloque este bloco DENTRO do mesmo server { } que já tem SSL e:
#        root /var/www/campoailanding/CampoAILanding;
#      Ou use no topo do server, antes de location:
#        include /caminho/absoluto/.../deploy/nginx-noticias-json-cors.conf;
#
#   3) Teste e recarregue:
#        nginx -t && systemctl reload nginx
#
#   4) No index.html (deploy Netlify), meta:
#        <meta name="campoai-noticias-json" content="https://SEU_DOMINIO_VPS/noticias.json" />
# =============================================================================

location = /noticias.json {
    limit_except GET OPTIONS {
        deny all;
    }

    if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin "https://agassist.netlify.app" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Accept" always;
        add_header Access-Control-Max-Age 86400 always;
        add_header Content-Length 0;
        add_header Content-Type text/plain;
        return 204;
    }

    add_header Access-Control-Allow-Origin "https://agassist.netlify.app" always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Accept" always;
    add_header Vary "Origin" always;

    default_type application/json;
    charset utf-8;
    try_files $uri =404;
}
