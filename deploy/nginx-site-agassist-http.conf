# Site completo HTTP (sem include) — copie o conteúdo para:
#   /etc/nginx/sites-available/campoailanding
# Ajuste server_name / origem CORS se mudar.
#
# Depois: ln -sf ... ; nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name agassist.duckdns.org;

    root /var/www/campoailanding/CampoAILanding;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /noticias.json {
        limit_except GET OPTIONS {
            deny all;
        }

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "https://agassist.netlify.app" always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Accept" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }

        add_header Access-Control-Allow-Origin "https://agassist.netlify.app" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Accept" always;
        add_header Vary "Origin" always;

        default_type application/json;
        charset utf-8;
        try_files $uri =404;
    }
}
